{% extends 'base.html' %}
{% block content %}
{% load static %}
<header class="masthead bg-index text-white text-center py-4">
    <div class="container d-flex align-items-center flex-column pt-2">
        <h2>Welcome to Wage Warriors</h2>
        <p>Fight for the wage you deserve!</p>
    </div>
</header>
<div class="p-3">
    <div class="container">
        <div class="row mt-3">
            <div class="row mx-auto text-center mb-3 align-items-center">
                {% comment %} <div class="spinner-border text-info justify-content-center d-flex" role="status"></div> {% endcomment %}
                <h4>Home page</h4>
                {% comment %} <div class="progress" role="progressbar" aria-label="Animated striped example" aria-valuenow="100" aria-valuemin="0" aria-valuemax="100">
                    <div class="progress-bar progress-bar-striped progress-bar-animated bg-info" style="width: 100%"></div>
                </div>
                <div class="progress" role="progressbar" aria-label="Animated striped example" aria-valuenow="100" aria-valuemin="0" aria-valuemax="100">
                    <div class="progress-bar progress-bar-striped progress-bar-animated bg-success" style="width: 100%"></div>
                </div> {% endcomment %}
                <div id="carouselExample" class="carousel slide align-items-center justify-content-center" data-bs-ride="carousel">
                    <div class="carousel-inner">
                        <div class="carousel-item active">
                        <img src="{% static 'img/carousel1.jpg' %}" class="d-block w-100" alt="...">
                        </div>
                        <div class="carousel-item">
                        <img src="{% static 'img/carousel2.jpg' %}" class="d-block w-100" alt="...">
                        </div>
                        <div class="carousel-item">
                        <img src="{% static 'img/carousel3.jpg' %}" class="d-block w-100" alt="...">
                        </div>
                    </div>
                    <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
                        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Previous</span>
                    </button>
                    <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
                        <span class="carousel-control-next-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Next</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
