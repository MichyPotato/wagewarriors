{% extends 'base.html' %}
{% block content %}
<header class="masthead bg-index text-white text-center py-4">
    <div class="container d-flex align-items-center flex-column pt-2">
        <h2>Welcome to the Map</h2>
        <hr>
    </div>
</header>
<div class="p-3">
    <div class="container">
        <div class="row mt-3">
            <div class="row mx-auto text-center mb-3">
                <h4>Map Page</h4>
                <hr>
                <div class="d-flex justify-content-center">
                    <div class="map-container" id="map" style="height: 600px; width: 600px"></div>
                </div>

                {% comment %} Javascript will be moved to a .js file when I feel like {% endcomment %}
                <script> 
                    var map = L.map('map').setView([33.78, -84.4], 13); // Centered on GT

                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
                    }).addTo(map);

                    // Example marker
                    var marker = L.marker([33.78, -84.4]).addTo(map);
                    marker.bindPopup("<b>Hello!</b><br>This is Georgia Tech!.").openPopup();
                </script>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
